                    } else {
                        const loadedMarkets = snapshot.docs.map(d => ({ ...d.data(), dbId: d.id }));
                        const loadedOriginalIds = loadedMarkets.map(m => m.id);
                        
                        // ✨ 自動比對：如果雲端遺漏了我們這次新加的攤位，自動補進去
                        defaultMarkets.forEach(m => {
                            if (!loadedOriginalIds.includes(m.id)) {
                                window.Firebase.setDoc(window.Firebase.doc(marketsRef, `default_${m.id}`), { ...m, dbId: `default_${m.id}` });
                            }
                        });

                        loadedMarkets.sort((a, b) => a.id - b.id);
                        setMarkets(loadedMarkets);
                        setIsLoading(false);
                    }
                }, (error) => {
                    console.error("雲端連線失敗", error);
                    setIsLoading(false);
                });

                return () => unsubscribe();
            }, [user]);

            const formatDate = (dateString) => {
                if (!dateString) return '';
                if (dateString.includes('-')) {
                    const date = new Date(dateString);
                    const month = String(date.getMonth() + 1).padStart(2, '0');
                    const day = String(date.getDate()).padStart(2, '0');
                    const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
                    const weekday = weekdays[date.getDay()];
                    return `${month}/${day}（${weekday}）`;
                }
                return dateString;
            };

            // 文字生成
            useEffect(() => {
                if (!selectedDate && selectedMarketIds.length === 0) {
                    setEditableText("");
                    return;
                }

                let text = "";
                if (selectedDate) {
                    text += `📍${formatDate(selectedDate)}地點\n\n`;
                }
                
                selectedMarketIds.forEach(id => {
                    const m = markets.find(x => x.dbId === id || x.id === id);
                    if (m) {
                        text += `📍${m.name}\n${m.address}\n`;
                        const matchedId = m.dbId || m.id;
                        if (dynamicNotes[matchedId]) {
                            text += `📍${dynamicNotes[matchedId]}\n`;
                        }
                        text += `\n`;
                    }
                });

                setEditableText(text.trimEnd());
            }, [selectedDate, selectedMarketIds, markets, dynamicNotes]);

            // 解析邏輯
            const handleSmartParse = () => {
                if (!importText.trim() || markets.length === 0) return;
                setIsParsing(true);
                
                setTimeout(() => {
                    let lines = importText.split('\n').map(l => l.trim()).filter(l => l);
                    let newSelectedIds = [];
                    let newDynamicNotes = {};
                    let newDateStr = "";

                    const dateLine = lines.find(l => /\d{1,2}\/\d{1,2}/.test(l));
                    if (dateLine) {
                        const match = dateLine.match(/(\d{1,2})\/(\d{1,2})/);
                        if (match) {
                            const currentYear = new Date().getFullYear();
                            const m = match[1].padStart(2, '0');
                            const d = match[2].padStart(2, '0');
                            newDateStr = `${currentYear}-${m}-${d}`;
                        } else {
                            newDateStr = dateLine;
                        }
                    }

                    let currentMarketId = null;
                    for (let i = 0; i < lines.length; i++) {
                        let line = lines[i];

                        if (line.includes('休') && !line.includes('市場')) continue;

                        if (line.includes('檔期')) {
                            if (currentMarketId) {
                                newDynamicNotes[currentMarketId] = line;
                            }
                            continue;
                        }

                        const numbersInLine = line.match(/\d+/g) || [];
                        let bestMatch = null;
                        let possibleMatches = markets.filter(m => {
                            let coreName = m.name.replace(/市場/g, ''); 
                            return line.includes(coreName);
                        });

                        if (possibleMatches.length === 1) {
                            bestMatch = possibleMatches[0];
                        } else if (possibleMatches.length > 1) {
                            bestMatch = possibleMatches.find(m => {
                                const addrNumbers = m.address.match(/\d+/g) || [];
                                return addrNumbers.some(num => numbersInLine.includes(num));
                            }) || possibleMatches[0]; 
                        }

                        if (bestMatch) {
                            const mId = bestMatch.dbId || bestMatch.id;
                            // 允許同一個市場被排到多次(有時不同人去同個市場)，所以不檢查 includes
                            newSelectedIds.push(mId);
                            currentMarketId = mId;
                        }
                    }

                    setSelectedDate(newDateStr);
                    setSelectedMarketIds(newSelectedIds);
                    setDynamicNotes(newDynamicNotes);
                    setImportText(""); 
                    setIsParsing(false);
                }, 400); 
            };

            const handleCopy = () => {
                if(!editableText) return;
                const textarea = document.createElement('textarea');
                textarea.value = editableText;
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    setCopySuccess(true);
                    setTimeout(() => setCopySuccess(false), 2000);
                } catch (err) {
                    alert('複製失敗，請手動複製。');
                }
                document.body.removeChild(textarea);
            };

            const handleAddMarket = async (e) => {
                e.preventDefault();
                if (!newMarket.name || !newMarket.address || !db) return;
                
                const marketsRef = window.Firebase.collection(db, 'artifacts', appId, 'public', 'data', 'markets');
                const customId = Date.now();
                await window.Firebase.addDoc(marketsRef, { ...newMarket, id: customId });
                
                setNewMarket({ region: newMarket.region, name: '', address: '', note: '' }); 
                alert('已成功新增並同步至雲端！');
            };

            const handleDeleteMarket = async (dbId) => {
                if (!db) return;
                if(confirm('⚠️ 確定要刪除嗎？\n這會連同所有同事手機上的資料一起刪除喔！')) {
                    const docRef = window.Firebase.doc(db, 'artifacts', appId, 'public', 'data', 'markets', dbId);
                    await window.Firebase.deleteDoc(docRef);
                }
            };

            if (!fbLoaded || isLoading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-50">
                        <div className="text-center text-indigo-600">
                            <i className="fa-solid fa-cloud-arrow-down fa-beat fa-2x mb-3"></i>
                            <p className="font-bold">連線雲端資料庫中...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20 md:pb-0 md:flex md:justify-center">
                    <div className="w-full max-w-md bg-white min-h-screen md:min-h-0 md:h-[95vh] md:my-4 md:rounded-3xl md:shadow-2xl overflow-hidden flex flex-col relative">
                        
                        {/* 標題列 */}
                        <div className="bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-4 text-center font-bold text-lg shadow-md z-10 flex justify-between items-center relative">
                            <div className="w-8"></div>
                            <span>報位神器</span>
                            <button 
                                onClick={() => setShowAddressBook(!showAddressBook)}
                                className="w-8 h-8 flex items-center justify-center bg-white/20 rounded-full hover:bg-white/30 transition text-sm"
                            >
                                {showAddressBook ? <i className="fa-solid fa-xmark"></i> : <i className="fa-solid fa-book-open"></i>}
                            </button>
                        </div>

                        {/* 主頁面 */}
                        {!showAddressBook && (
                            <div className="flex-1 overflow-y-auto p-4 bg-gray-50 flex flex-col gap-4 no-scrollbar">
                                
                                <div className={`bg-white p-4 rounded-2xl shadow-sm border ${isParsing ? 'border-indigo-400 animate-parse' : 'border-indigo-100'} transition-all`}>
                                    <div className="flex items-center gap-2 mb-3">
                                        <div className="bg-indigo-600 text-white w-6 h-6 rounded-full flex justify-center items-center font-bold text-sm"><i className="fa-solid fa-bolt text-xs"></i></div>
                                        <label className="text-gray-800 font-bold text-lg text-indigo-700">報位表丟這</label>
                                    </div>
                                    <textarea 
                                        value={importText}
                                        onChange={(e) => setImportText(e.target.value)}
                                        placeholder=""
                                        className="w-full p-3 bg-indigo-50 border border-indigo-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm resize-none mb-3 text-gray-700"
                                        rows="4"
                                    ></textarea>
                                    <button 
                                        onClick={handleSmartParse} 
                                        disabled={isParsing || !importText.trim()}
                                        className={`w-full font-bold py-3 rounded-xl shadow-md transition-all ${!importText.trim() ? 'bg-gray-200 text-gray-400' : 'bg-gradient-to-r from-indigo-500 to-blue-500 text-white hover:opacity-90 transform active:scale-95'}`}
                                    >
                                        {isParsing ? <><i className="fa-solid fa-spinner fa-spin mr-2"></i>處理中...</> : <><i className="fa-solid fa-wand-magic-sparkles mr-2"></i>一鍵產生純地址！</>}
                                    </button>
                                </div>

                                <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col mb-[70px]">
                                    <textarea 
                                        value={editableText}
                                        onChange={(e) => setEditableText(e.target.value)}
                                        placeholder=""
                                        className="w-full flex-1 p-3 bg-yellow-50 border border-yellow-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-yellow-400 text-sm resize-none text-gray-800 leading-relaxed"
                                        style={{ minHeight: '350px' }}
                                    ></textarea>
                                </div>
                            </div>
                        )}

                        {/* 地址簿頁面 */}
                        {showAddressBook && (
                            <div className="flex-1 overflow-y-auto p-4 bg-gray-50">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-xl font-bold text-gray-800">
                                        <i className="fa-solid fa-cloud text-blue-500 mr-2"></i>雲端地址簿 ({markets.length} 攤)
                                    </h2>
                                </div>
                                <div className="text-xs text-orange-500 font-bold mb-4 bg-orange-50 p-2 rounded">
                                    ⚠️ 在這裡新增或刪除，所有同事的手機都會同步變更喔！
                                </div>

                                <form onSubmit={handleAddMarket} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 mb-6">
                                    <div className="space-y-3">
                                        <select value={newMarket.region} onChange={e => setNewMarket({...newMarket, region: e.target.value})} className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                            {REGIONS.map(r => <option key={r} value={r}>{r}</option>)}
                                        </select>
                                        <input type="text" placeholder="市場名稱 (如: 綜合市場)" required value={newMarket.name} onChange={e => setNewMarket({...newMarket, name: e.target.value})} className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"/>
                                        <input type="text" placeholder="詳細地址 (包含門牌號碼)" required value={newMarket.address} onChange={e => setNewMarket({...newMarket, address: e.target.value})} className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"/>
                                        <button type="submit" className="w-full bg-blue-100 text-blue-700 font-bold py-2 rounded-lg hover:bg-blue-200 transition-colors"><i className="fa-solid fa-plus mr-1"></i> 新增並同步</button>
                                    </div>
                                </form>

                                <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                                    {REGIONS.map(region => {
                                        const rMarkets = markets.filter(m => m.region === region);
                                        if(rMarkets.length === 0) return null;
                                        return (
                                            <div key={`edit-${region}`} className="mb-4">
                                                <div className="text-sm font-bold text-gray-500 mb-2">{region}</div>
                                                <div className="space-y-2">
                                                    {rMarkets.map(m => (
                                                        <div key={m.dbId} className="p-3 border border-gray-100 rounded-xl bg-gray-50 flex justify-between items-start">
                                                            <div className="flex-1 min-w-0 pr-2">
                                                                <div className="font-bold text-gray-800">{m.name}</div>
                                                                <div className="text-xs text-blue-600 font-medium mt-1 truncate">{m.address}</div>
                                                            </div>
                                                            <button onClick={() => handleDeleteMarket(m.dbId)} className="text-red-400 hover:text-red-600 p-2 flex-shrink-0"><i className="fa-solid fa-trash-can"></i></button>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* 浮動複製按鈕 */}
                        {!showAddressBook && (
                            <div className="absolute bottom-0 left-0 right-0 p-4 bg-white border-t border-gray-100 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-20">
                                <button 
                                    onClick={handleCopy}
                                    disabled={!editableText}
                                    className={`w-full py-4 rounded-xl font-bold text-lg text-white transition-all transform active:scale-95 flex justify-center items-center gap-2 ${copySuccess ? 'bg-green-500' : !editableText ? 'bg-gray-300' : 'bg-blue-600 hover:bg-blue-700 shadow-lg'}`}
                                >
                                    {copySuccess ? (
                                        <><i className="fa-solid fa-check"></i> 已複製！請貼到 LINE</>
                                    ) : (
                                        <><i className="fa-regular fa-copy"></i> 複製地址</>
                                    )}
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

```
