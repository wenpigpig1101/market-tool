            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col mb-[70px]">

            </div>
        </div>

        <!-- 地址簿畫面 (預設隱藏) -->
        <div id="bookView" class="flex-1 overflow-y-auto p-4 bg-gray-50 pb-[80px]" style="display: none;">

        // 安全讀取資料庫
        function loadMarkets() {
            try {
                let saved = localStorage.getItem('marketDb_native_v1');
                if(saved) {
                    let parsed = JSON.parse(saved);
                    // 把程式碼裡的新市場補進去
                    defaultMarkets.forEach(dm => {
                        if(!parsed.find(m => m.id === dm.id)) parsed.push(dm);
                    });
                    markets = parsed;
                } else {
                    markets = [...defaultMarkets];
                }
            } catch(e) {
                // 如果無痕模式阻擋 localStorage，直接吃預設資料
                markets = [...defaultMarkets];
            }
        }

        // 安全儲存資料庫
        function saveMarkets() {
            try {
                localStorage.setItem('marketDb_native_v1', JSON.stringify(markets));
            } catch(e) { console.warn("無痕模式下無法永久儲存新增的市場。"); }
        }

        // 初始化
        window.onload = function() {
            loadMarkets();
        };

        function toggleBook() {
            isBookOpen = !isBookOpen;
            document.getElementById('mainView').style.display = isBookOpen ? 'none' : 'flex';
            document.getElementById('bookView').style.display = isBookOpen ? 'block' : 'none';
            document.getElementById('copyBtnContainer').style.display = isBookOpen ? 'none' : 'block';
            document.getElementById('bookToggleIcon').className = isBookOpen ? 'fa-solid fa-xmark' : 'fa-solid fa-book-open';
            if(isBookOpen) renderBook();
        }

        // 複製按鈕狀態
        function updateCopyBtn() {
            const txt = document.getElementById('outputText').value;
            const btn = document.getElementById('copyBtn');
            if(txt) {
                btn.disabled = false;
                btn.classList.remove('bg-gray-300');
                btn.classList.add('bg-blue-600', 'hover:bg-blue-700', 'shadow-lg');
            } else {
                btn.disabled = true;
                btn.classList.add('bg-gray-300');
                btn.classList.remove('bg-blue-600', 'hover:bg-blue-700', 'shadow-lg');
            }
        }

        // 智能解析
        function handleParse() {
            const importText = document.getElementById('importText').value;
            if(!importText.trim()) return;

            const btn = document.getElementById('parseBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>處理中...';
            btn.disabled = true;

            setTimeout(() => {
                let lines = importText.split('\n').map(l => l.trim()).filter(l => l);
                let selectedIds = [];
                let dynamicNotes = {};
                let dateStr = "";

                // 找日期
                const dateLine = lines.find(l => /\d{1,2}\/\d{1,2}/.test(l));
                if (dateLine) {
                    const match = dateLine.match(/(\d{1,2})\/(\d{1,2})/);
                    if (match) {
                        const currentYear = new Date().getFullYear();
                        const m = match[1].padStart(2, '0');
                        const d = match[2].padStart(2, '0');
                        dateStr = `${currentYear}-${m}-${d}`;
                    } else {
                        dateStr = dateLine;
                    }
                }

                let currentMarketId = null;
                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i];
                    if (line.includes('休') && !line.includes('市場')) continue;
                    if (line.includes('檔期')) {
                        if (currentMarketId) dynamicNotes[currentMarketId] = line;
                        continue;
                    }

                    const numbersInLine = line.match(/\d+/g) || [];
                    let possibleMatches = markets.filter(m => {
                        let coreName = m.name.replace(/市場/g, ''); 
                        return line.includes(coreName);
                    });

                    let bestMatch = null;
                    if (possibleMatches.length === 1) {
                        bestMatch = possibleMatches[0];
                    } else if (possibleMatches.length > 1) {
                        bestMatch = possibleMatches.find(m => {
                            const addrNumbers = m.address.match(/\d+/g) || [];
                            return addrNumbers.some(num => numbersInLine.includes(num));
                        }) || possibleMatches[0]; 
                    }

                    if (bestMatch) {
                        selectedIds.push(bestMatch.id);
                        currentMarketId = bestMatch.id;
                    }
                }

                // 產生結果文字
                let outText = "";
                if (dateStr) {
                    if (dateStr.includes('-')) {
                        const d = new Date(dateStr);
                        const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
                        outText += `📍${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}（${weekdays[d.getDay()]}）地點\n\n`;
                    } else {
                        outText += `📍${dateStr}地點\n\n`;
                    }
                }

                selectedIds.forEach(id => {
                    const m = markets.find(x => x.id === id);
                    if (m) {
                        outText += `📍${m.name}\n${m.address}\n`;
                        if (dynamicNotes[id]) outText += `📍${dynamicNotes[id]}\n`;
                        outText += `\n`;
                    }
                });

                document.getElementById('outputText').value = outText.trimEnd();
                document.getElementById('importText').value = ""; 
                
                btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles mr-2"></i>一鍵產生純地址！';
                btn.disabled = false;
                updateCopyBtn();
            }, 300);
        }

        // 複製功能
        function copyText() {
            const text = document.getElementById('outputText').value;
            if(!text) return;
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                const btn = document.getElementById('copyBtn');
                btn.innerHTML = '<i class="fa-solid fa-check"></i> 已複製！請貼到 LINE';
                btn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
                btn.classList.add('bg-green-500', 'hover:bg-green-600');
                setTimeout(() => {
                    btn.innerHTML = '<i class="fa-regular fa-copy"></i> 複製地址';
                    btn.classList.remove('bg-green-500', 'hover:bg-green-600');
                    btn.classList.add('bg-blue-600', 'hover:bg-blue-700');
                }, 2000);
            } catch (err) {
                alert('複製失敗');
            }
            document.body.removeChild(textarea);
        }

        // 渲染地址簿
        function renderBook() {
            document.getElementById('marketCount').innerText = markets.length;
            const container = document.getElementById('bookList');
            container.innerHTML = '';
            
            const REGIONS = ['台北市', '新北市', '基隆/宜蘭', '桃竹苗', '中彰投', '雲嘉南', '高屏', '花東/外島'];
            
            REGIONS.forEach(region => {
                const rm = markets.filter(m => m.region === region);
                if(rm.length === 0) return;
                
                let html = `<div class="mb-4"><div class="text-sm font-bold text-gray-500 mb-2">${region}</div><div class="space-y-2">`;
                rm.forEach(m => {
                    html += `
                        <div class="p-3 border border-gray-100 rounded-xl bg-gray-50 flex justify-between items-start">
                            <div class="flex-1 min-w-0 pr-2">
                                <div class="font-bold text-gray-800">${m.name}</div>
                                <div class="text-xs text-blue-600 font-medium mt-1 truncate">${m.address}</div>
                            </div>
                            <button onclick="deleteMarket(${m.id})" class="text-red-400 hover:text-red-600 p-2 flex-shrink-0"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    `;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            });
        }

        // 新增與刪除市場
        function addMarket(e) {
            e.preventDefault();
            const region = document.getElementById('newRegion').value;
            const name = document.getElementById('newName').value;
            const address = document.getElementById('newAddress').value;
            if(!name || !address) return;

            markets.push({ id: Date.now(), region, name, address, note: '' });
            saveMarkets();
            
            document.getElementById('newName').value = '';
            document.getElementById('newAddress').value = '';
            alert('新增成功！');
            renderBook();
        }

        function deleteMarket(id) {
            if(confirm('確定要刪除嗎？')) {
                markets = markets.filter(m => m.id !== id);
                saveMarkets();
                renderBook();
            }
        }
    </script>
</body>
</html>
